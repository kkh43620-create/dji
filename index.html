<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع DJI - الهيكل والجمبل</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>DJI Dron</h1>
           
            <h1 class="tagline-header">رحبة حمص (الموقع قيد الصيانة )</h1>
           


            


        </div>
        
        <div class="header-controls">
            <button id="darkModeToggle">🌙</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h2>اختر الفئة</h2>
                <div class="hero-divider"></div>
            </div>
        </section>

        <section class="categories-grid main-categories">
            <div class="category-card main-card">
                <div class="card-wrapper">
                    <div class="card-icon">
                        <svg viewBox="0 0 100 100" width="100" height="100">
                            <path d="M50 20 L65 35 L90 40 L70 60 L75 85 L50 70 L25 85 L30 60 L10 40 L35 35 Z" fill="#667eea"/>
                        </svg>
                    </div>
                    <div class="card-content">
                        <h3>الهيكل</h3>
                        <a href="structure.html" class="btn btn-primary">اكتشف المزيد</a>
                    </div>
                </div>
                <div class="card-overlay"></div>
            </div>

            <div class="category-card main-card">
                <div class="card-wrapper">
                    <div class="card-icon">
                        <svg viewBox="0 0 100 100" width="100" height="100">
                            <circle cx="50" cy="50" r="35" fill="none" stroke="#667eea" stroke-width="3"/>
                            <circle cx="50" cy="50" r="25" fill="none" stroke="#667eea" stroke-width="2"/>
                            <polygon points="50,30 60,50 50,70 40,50" fill="#667eea"/>
                        </svg>
                    </div>
                    <div class="card-content">
                        <h3>الجمبل</h3>
                        <a href="gimbal.html" class="btn btn-primary">اكتشف المزيد</a>
                    </div>
                </div>
                <div class="card-overlay"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; موقع فيديوهات - DJI Drones</p>
            <p>فيديوهات مساعدة للصيانة فقط</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
